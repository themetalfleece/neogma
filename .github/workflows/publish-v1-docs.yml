name: Publish v1 docs

on:
  push:
    branches:
      - release/v1
    paths:
      - 'documentation/**'

  workflow_dispatch:

jobs:
  publishDocs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install codedoc
        run: npm i -g @codedoc/cli

      - name: Install dependencies
        run: |
          cd documentation/.codedoc
          npm ci

      - name: Build docs
        run: |
          cd documentation
          codedoc build

      - name: Move related files to tmp
        run: |
          mkdir -p /tmp/neogma/v1
          cp -r ./documentation/docs /tmp/neogma/v1/docs
          cp documentation/index.html /tmp/neogma/v1/index.html
          cp documentation/favicon.ico /tmp/neogma/v1/favicon.ico

      - name: Checkout docs branch
        uses: actions/checkout@v4
        with:
          ref: docs

      - name: Deploy v1 docs to subdirectory
        run: |
          rm -rf v1
          cp -r /tmp/neogma/v1 v1
          git config --global user.name 'Docs builder'
          git config --global user.email 'themetalfleece@users.noreply.github.com'
          git add v1
          git commit -m "Build v1 docs"
          git push origin docs
