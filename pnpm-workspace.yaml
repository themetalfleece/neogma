# pnpm workspace configuration
# https://pnpm.io/pnpm-workspace_yaml
packages:
  - '.'
  - 'packages/*'
  - 'docs'

# Dependencies that are explicitly allowed to run install/build scripts.
# pnpm 11+ blocks lifecycle scripts by default; list trusted packages here.
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true

# Override vulnerable transitive dependencies to patched versions.
overrides:
  multer: '>=2.2.0'
  postcss: '>=8.5.10'
